<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>GG PRO - Console de Guerra</title>
    
    <!-- CSS Crítico para Mobile-First e Performance -->
    <style>
      :root {
        --bg-main: #020617;
        --primary: #3b82f6;
        --text: #f8fafc;
      }
      body { 
        margin: 0; 
        background: var(--bg-main); 
        color: var(--text); 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        overflow: hidden; 
        height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }
      #root { height: 100%; display: flex; flex-direction: column; }
      /* Preloader simples */
      .loader-init { 
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; 
        background: #020617; z-index: 9999; transition: opacity 0.5s;
      }
    </style>

    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    
    <!-- Bibliotecas Necessárias (Versões Estáveis) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
</head>
<body>
    <div id="root">
      <div class="loader-init" id="main-loader">
        <div style="font-weight: 900; letter-spacing: 0.2em; color: #3b82f6; animation: pulse 1.5s infinite;">GG PRO LOADING...</div>
      </div>
    </div>

    <!-- Ponto de Entrada -->
    <script type="module" src="./js/app.js"></script>

    <style>
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</body>
</html>
